    - "what caused"
    - "dropped"
    - "increased"
    - "decreased"
    - "fell"
    - "rose"
    - "changed"
    - "spike"
    - "dip"
    - "decline"
    - "growth"
    - "driver"
    - "reason"

  compare:
    - "vs"
    - "versus"
    - "compare"
    - "compared to"
    - "difference between"
    - "better"
    - "worse"
    - "outperform"
    - "underperform"
    - "this week vs"
    - "last week vs"
    - "region a vs"
    - "which is"
    - "how does"

  breakdown:
    - "breakdown"
    - "break down"
    - "what makes up"
    - "decompose"
    - "composition"
    - "split"
    - "by department"
    - "by region"
    - "by product"
    - "by channel"
    - "contributors"
    - "components"
    - "share"
    - "proportion"

  summarize:
    - "summary"
    - "summarize"
    - "summarise"
    - "overview"
    - "digest"
    - "update"
    - "weekly summary"
    - "monthly summary"
    - "daily summary"
    - "give me a"
    - "what happened"
    - "how are we doing"
    - "state of"
    - "report"